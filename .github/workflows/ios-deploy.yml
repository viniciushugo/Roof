name: iOS — Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      lane:
        description: "Fastlane lane to run"
        required: true
        default: "beta"
        type: choice
        options:
          - beta
          - release

concurrency:
  group: ios-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-deploy:
    name: "iOS ${{ github.event.inputs.lane || 'beta' }}"
    runs-on: macos-latest
    timeout-minutes: 60

    env:
      # ── Vite build env ──
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_AMPLITUDE_API_KEY: ${{ secrets.VITE_AMPLITUDE_API_KEY }}
      # ── Apple / Fastlane ──
      APPLE_ID: ${{ secrets.APPLE_ID }}
      ITC_TEAM_ID: ${{ secrets.ITC_TEAM_ID }}
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      # Required for Node 24 support in existing actions
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ── 0. Validate required secrets ──
      - name: Validate required secrets
        run: |
          missing=()
          [ -z "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" ]      && missing+=("APP_STORE_CONNECT_API_KEY_ID")
          [ -z "${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}" ]    && missing+=("APP_STORE_CONNECT_API_ISSUER_ID")
          [ -z "${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}" ]  && missing+=("APP_STORE_CONNECT_API_KEY_CONTENT")
          [ -z "${{ secrets.MATCH_GIT_URL }}" ]                      && missing+=("MATCH_GIT_URL")
          [ -z "${{ secrets.MATCH_PASSWORD }}" ]                     && missing+=("MATCH_PASSWORD")
          [ -z "${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}" ]      && missing+=("MATCH_GIT_BASIC_AUTHORIZATION")
          [ -z "${{ secrets.APPLE_ID }}" ]                           && missing+=("APPLE_ID")
          [ -z "${{ secrets.ITC_TEAM_ID }}" ]                        && missing+=("ITC_TEAM_ID")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::warning::⚠️ iOS deploy skipped — missing secrets: ${missing[*]}"
            echo "SECRETS_MISSING=true" >> "$GITHUB_ENV"
          else
            echo "✅ All required secrets are configured"
            echo "SECRETS_MISSING=false" >> "$GITHUB_ENV"
          fi

      # ── 1. Checkout ──
      - name: Checkout repository
        if: env.SECRETS_MISSING == 'false'
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ──
      - name: Setup Node.js
        if: env.SECRETS_MISSING == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      # ── 3. Install JS dependencies ──
      - name: Install dependencies
        if: env.SECRETS_MISSING == 'false'
        run: npm ci

      # ── 4. Build web assets ──
      - name: Build web app
        if: env.SECRETS_MISSING == 'false'
        run: npm run build

      # ── 5. Sync Capacitor (iOS) ──
      - name: Capacitor sync iOS
        if: env.SECRETS_MISSING == 'false'
        run: npx cap sync ios

      # ── 6. Setup Ruby & Fastlane ──
      - name: Setup Ruby
        if: env.SECRETS_MISSING == 'false'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: ios/App

      # ── 8. Run Fastlane ──
      - name: Run Fastlane
        if: env.SECRETS_MISSING == 'false'
        working-directory: ios/App
        env:
          GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: bundle exec fastlane ${{ github.event.inputs.lane || 'beta' }}

      # ── 8. Upload IPA as artifact ──
      - name: Upload IPA artifact
        if: env.SECRETS_MISSING == 'false' && success()
        uses: actions/upload-artifact@v4
        with:
          name: Roof-iOS-${{ github.sha }}
          path: ios/App/build/Roof.ipa
          retention-days: 14

      # ── 9. Summary ──
      - name: Skipped summary
        if: env.SECRETS_MISSING == 'true'
        run: |
          echo "## ⚠️ iOS Deploy Skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "One or more required secrets are not configured." >> "$GITHUB_STEP_SUMMARY"
          echo "Check the workflow logs for the list of missing secrets." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "See the [setup guide](https://github.com/${{ github.repository }}/blob/main/.github/workflows/ios-deploy.yml) for details." >> "$GITHUB_STEP_SUMMARY"
